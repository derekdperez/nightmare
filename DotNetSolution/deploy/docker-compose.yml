# Run from DotNetSolution: ./deploy/deploy.sh  (installs Docker on Linux if needed; see deploy/lib-install-deps.sh)
# Or: docker compose -f deploy/docker-compose.yml --project-directory . up -d --build
#
# Troubleshooting:
# - "failed to execute bake: exit status 1": deploy scripts default COMPOSE_BAKE=false. If you invoke compose
#   yourself, try:  COMPOSE_BAKE=false docker compose -f deploy/docker-compose.yml build
# - Inspecting the Command Center image without Postgres: the app ENTRYPOINT is the web DLL; appsettings default
#   Postgres is localhost. Use compose (sets ConnectionStrings__Postgres=Host=postgres) or override env. To run
#   the dotnet CLI in the image:  docker run --rm --entrypoint dotnet <image> --info
# - Skip DB creation on startup (smoke tests only): NIGHTMARE_SKIP_STARTUP_DATABASE=1 (see Nightmare:SkipStartupDatabase).
name: nightmare-v2

x-dotnet-build-args: &dotnet-build-args
  BUILD_SOURCE_STAMP: ${BUILD_SOURCE_STAMP:-unknown}

x-common-env: &common-env
  ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=nightmare_v2;Username=nightmare;Password=nightmare
  ConnectionStrings__FileStore: Host=postgres;Port=5432;Database=nightmare_v2_files;Username=nightmare;Password=nightmare
  ConnectionStrings__Redis: redis:6379
  RabbitMq__Host: rabbitmq
  RabbitMq__Username: nightmare
  RabbitMq__Password: nightmare
  RabbitMq__VirtualHost: /
  RabbitMq__ManagementUrl: http://rabbitmq:15672

configs:
  # Avoid bind-mounting ./deploy/postgres/*.sql into postgres (wrong CWD → Docker creates a directory
  # at the mount path and Postgres init fails with exit 1). This job runs after Postgres is healthy.
  filestore_db_init_sh:
    content: |
      #!/bin/sh
      set -eu
      # Do not use bash numeric compare on an empty psql count (set -e aborts); use grep instead.
      if psql -h postgres -U nightmare -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname = 'nightmare_v2_files'" 2>/dev/null | grep -q '^[[:space:]]*1[[:space:]]*$'; then
        echo "nightmare_v2_files already exists; nothing to do."
        exit 0
      fi
      psql -h postgres -U nightmare -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE nightmare_v2_files OWNER nightmare;"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nightmare
      POSTGRES_PASSWORD: nightmare
      POSTGRES_DB: nightmare_v2
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nightmare -d nightmare_v2"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  filestore-db-init:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: nightmare
    configs:
      - source: filestore_db_init_sh
        target: /run/filestore-db-init.sh
    entrypoint: ["/bin/sh", "/run/filestore-db-init.sh"]
    restart: "no"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: nightmare
      RABBITMQ_DEFAULT_PASS: nightmare
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  command-center:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        <<: *dotnet-build-args
    environment:
      <<: *common-env
      ASPNETCORE_URLS: http://+:8080
      # Container only serves HTTP on 8080; skip HTTPS redirect/HSTS so browsers are not sent to https:// on this port.
      Nightmare__ListenPlainHttp: "true"
      # GET /api/diagnostics/self (JSON). Set Nightmare__Diagnostics__ApiKey and send header X-Nightmare-Diagnostics-Key when exposing publicly.
      Nightmare__Diagnostics__Enabled: "true"
      # POST /api/maintenance/* (destructive). Set Nightmare__DataMaintenance__ApiKey and header X-Nightmare-Maintenance-Key when enabling.
      # Nightmare__DataMaintenance__Enabled: "true"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      filestore-db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  gatekeeper:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: NightmareV2.Gatekeeper
        APP_DLL: NightmareV2.Gatekeeper.dll
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker-spider:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: NightmareV2.Workers.Spider
        APP_DLL: NightmareV2.Workers.Spider.dll
    environment:
      <<: *common-env
      # Local stack: accept TLS name mismatches (parked domains, CDN SNI). Set false for strict prod.
      Spider__Http__AllowInsecureSsl: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker-enum:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: NightmareV2.Workers.Enum
        APP_DLL: NightmareV2.Workers.Enum.dll
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker-portscan:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: NightmareV2.Workers.PortScan
        APP_DLL: NightmareV2.Workers.PortScan.dll
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker-highvalue:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
      args:
        <<: *dotnet-build-args
        PROJECT_DIR: NightmareV2.Workers.HighValue
        APP_DLL: NightmareV2.Workers.HighValue.dll
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata:
